<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hater</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #111; line-height: 1.5; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 28px 16px 60px; text-align: center; }
    h1 { font-weight: 600; }
    button, .btn { font: inherit; font-size: 1rem; padding: 12px 22px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #111; cursor: pointer; }
    button.primary, .btn.primary { background: #111; color: #fff; border-color: #111; }
    button:disabled { opacity: 0.4; cursor: default; }
    #preview { max-width: 100%; max-height: 320px; border-radius: 12px; margin: 18px 0; display: none; }
    #roast { font-size: 1.25rem; margin: 20px 0; min-height: 1.4em; white-space: pre-wrap; }
    .muted { color: #777; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔥 Hater</h1>
    <p class="muted">Lade ein Foto hoch und die KI roastet es gnadenlos.</p>

    <label class="btn primary" for="fileInput">Foto auswählen</label>
    <input id="fileInput" type="file" accept="image/*" style="display:none">

    <img id="preview" alt="">
    <div id="roast"></div>

    <canvas id="canvas" style="display:none"></canvas>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const roastEl = document.getElementById('roast');
    const canvas = document.getElementById('canvas');

    fileInput.onchange = () => {
      const file = fileInput.files[0];
      fileInput.value = '';
      if (!file) return;
      roastEl.textContent = '';
      const img = new Image();
      img.onload = () => {
        // shrink to max 768px and re-encode as JPEG (fast upload + handles iPhone HEIC)
        const max = 768;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        preview.src = canvas.toDataURL('image/jpeg', 0.85);
        preview.style.display = 'block';
        canvas.toBlob(roast, 'image/jpeg', 0.85);
      };
      img.onerror = () => { roastEl.textContent = '😕 Bild konnte nicht geladen werden (HEIC am Computer?). Probiers mit JPEG/PNG.'; };
      img.src = URL.createObjectURL(file);
    };

    async function roast(blob) {
      roastEl.textContent = '🤔 Die KI sucht nach Schwächen…';
      try {
        const res = await fetch('/api/roast', { method: 'POST', body: blob });
        const data = await res.json();
        roastEl.textContent = data.roast || ('😬 ' + (data.error || 'Kein Roast.'));
      } catch (e) {
        roastEl.textContent = '😬 Fehler: ' + e;
      }
    }
  </script>
</body>
</html>
