<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chooser</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nizza">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="theme-color" content="#11131a">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #111;
      overflow: hidden;
    }
    .view { position: fixed; inset: 0; display: none; flex-direction: column; }
    .view.active { display: flex; }

    button {
      font-family: inherit;
      font-size: 1rem;
      padding: 10px 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      cursor: pointer;
    }
    button:active { background: #f2f2f2; }
    button:disabled { opacity: 0.4; cursor: default; }

    .back { position: absolute; top: 14px; right: 14px; z-index: 10; }
    .apphome { position: fixed; top: 14px; left: 14px; z-index: 11; text-decoration: none; font-size: 1.2rem; line-height: 1; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 6px 12px; color: #111; }

    /* ---------- Home ---------- */
    #home { align-items: center; justify-content: center; gap: 16px; padding: 24px; }
    #home h1 { font-weight: 600; margin-bottom: 12px; }
    #home button { width: min(80vw, 280px); padding: 16px; }

    /* ---------- Wheel ---------- */
    #wheel { align-items: center; padding: 64px 20px 24px; gap: 16px; overflow-y: auto; }
    .name-input { display: flex; gap: 8px; width: min(92vw, 340px); }
    .name-input input {
      flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;
    }
    #chips { display: flex; flex-wrap: wrap; gap: 8px; width: min(92vw, 340px); justify-content: center; }
    .chip { font-size: 0.95rem; }
    .chip span { cursor: pointer; color: #999; font-weight: 700; margin-left: 2px; }
    .wheel-wrap { position: relative; width: 300px; height: 300px; max-width: 86vw; max-height: 86vw; }
    #wheelCanvas { width: 100%; height: 100%; display: block; transition: transform 4.5s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
    .pointer {
      position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
      border-top: 20px solid #111; z-index: 5;
    }
    #wheelResult { font-size: 1.4rem; font-weight: 600; min-height: 1.4em; }

    /* ---------- Finger ---------- */
    #touchpad { flex: 1; position: relative; touch-action: none; }
    #fingerHint {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 30px; color: #888; pointer-events: none;
    }
    .dot {
      position: absolute; width: 100px; height: 100px; margin: -50px 0 0 -50px;
      border-radius: 50%; pointer-events: none; border: 5px solid #111;
    }
    .dot.pulse { animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .dot.winner { animation: win 0.4s ease-out forwards; }
    @keyframes win { to { transform: scale(2.2); } }
    .dot.loser { animation: lose 0.3s ease-out forwards; }
    @keyframes lose { to { transform: scale(0); opacity: 0; } }
  </style>
</head>
<body>
  <a href="/" class="apphome">←</a>

  <!-- ===================== HOME ===================== -->
  <section id="home" class="view active">
    <h1>Chooser</h1>
    <button id="toWheel">🎡 Glücksrad</button>
    <button id="toFinger">👆 Finger-Chooser</button>
  </section>

  <!-- ===================== WHEEL ===================== -->
  <section id="wheel" class="view">
    <button class="back" data-home>← Zurück</button>
    <div class="name-input">
      <input id="nameInput" placeholder="Name eingeben…" autocomplete="off">
      <button id="addBtn">＋</button>
    </div>
    <div id="chips"></div>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="640" height="640"></canvas>
    </div>
    <button id="spinBtn">Drehen</button>
    <div id="wheelResult"></div>
  </section>

  <!-- ===================== FINGER ===================== -->
  <section id="finger" class="view">
    <button class="back" data-home>← Zurück</button>
    <div id="touchpad">
      <div id="fingerHint">Alle legen einen Finger auf den Bildschirm.<br>Nach ein paar Sekunden wird einer gewählt.</div>
    </div>
  </section>

  <script>
    // ---------- Navigation ----------
    const views = { home: document.getElementById('home'), wheel: document.getElementById('wheel'), finger: document.getElementById('finger') };
    function show(name) {
      Object.values(views).forEach(v => v.classList.remove('active'));
      views[name].classList.add('active');
      if (name === 'wheel') drawWheel();
      if (name !== 'finger') resetFinger();
    }
    document.getElementById('toWheel').onclick = () => show('wheel');
    document.getElementById('toFinger').onclick = () => show('finger');
    document.querySelectorAll('[data-home]').forEach(b => b.onclick = () => show('home'));

    const palette = ['#e6194B','#3cb44b','#f58231','#4363d8','#911eb4','#f032e6','#469990','#9A6324','#800000','#808000','#000075','#e67e22'];

    // ========================================================
    //  WHEEL
    // ========================================================
    let names = ['Martin'];
    let rotation = 0;
    let spinning = false;
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const SIZE = canvas.width;
    const R = SIZE / 2;

    const chips = document.getElementById('chips');
    const nameInput = document.getElementById('nameInput');
    const spinBtn = document.getElementById('spinBtn');
    const wheelResult = document.getElementById('wheelResult');

    function renderChips() {
      chips.innerHTML = '';
      names.forEach((n, i) => {
        const el = document.createElement('div');
        el.className = 'chip';
        el.innerHTML = `${n} <span>✕</span>`;
        el.querySelector('span').onclick = () => { names.splice(i, 1); renderChips(); drawWheel(); };
        chips.appendChild(el);
      });
      spinBtn.disabled = names.length < 2;
    }

    function addName() {
      const v = nameInput.value.trim();
      if (v) { names.push(v); nameInput.value = ''; renderChips(); drawWheel(); }
      nameInput.focus();
    }
    document.getElementById('addBtn').onclick = addName;
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

    function drawWheel() {
      const n = names.length;
      ctx.clearRect(0, 0, SIZE, SIZE);
      if (n === 0) return;
      const seg = (2 * Math.PI) / n;
      for (let i = 0; i < n; i++) {
        const start = i * seg, end = start + seg;
        ctx.beginPath();
        ctx.moveTo(R, R);
        ctx.arc(R, R, R, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i % palette.length];
        ctx.fill();
        // label
        ctx.save();
        ctx.translate(R, R);
        ctx.rotate(start + seg / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText(names[i].slice(0, 12), R - 24, 10);
        ctx.restore();
      }
    }

    spinBtn.onclick = () => {
      if (spinning || names.length < 2) return;
      spinning = true;
      wheelResult.textContent = '';
      const n = names.length;
      const seg = 360 / n;
      const target = rotation + 5 * 360 + Math.random() * 360;
      rotation = target;
      canvas.style.transform = `rotate(${target}deg)`;
      // Pointer sits at the top (canvas angle 270°). Find which segment ends up there.
      const finalRot = ((target % 360) + 360) % 360;
      const pointerAngle = ((270 - finalRot) % 360 + 360) % 360;
      const index = Math.floor(pointerAngle / seg) % n;
      setTimeout(() => {
        wheelResult.textContent = '🎉 ' + names[index];
        spinning = false;
      }, 4600);
    };

    renderChips();

    // ========================================================
    //  FINGER CHOOSER  (rigged: the FIRST finger never wins)
    // ========================================================
    const touchpad = document.getElementById('touchpad');
    const hint = document.getElementById('fingerHint');
    const fingers = new Map();   // touchId -> { el, order }
    let order = 0;
    let pickTimer = null;
    let decided = false;

    function resetFinger() {
      fingers.forEach(f => f.el.remove());
      fingers.clear();
      clearTimeout(pickTimer);
      pickTimer = null;
      decided = false;
      order = 0;
      hint.style.display = '';
    }

    function schedulePick() {
      clearTimeout(pickTimer);
      if (decided || fingers.size < 2) return;
      fingers.forEach(f => f.el.classList.add('pulse'));
      pickTimer = setTimeout(pickWinner, 3000);
    }

    function pickWinner() {
      if (fingers.size < 2) return;
      decided = true;
      // The earliest finger (smallest order) is excluded from winning.
      const entries = [...fingers.values()];
      const firstOrder = Math.min(...entries.map(f => f.order));
      const candidates = entries.filter(f => f.order !== firstOrder);
      const winner = candidates[Math.floor(Math.random() * candidates.length)];
      if (navigator.vibrate) navigator.vibrate(200);
      fingers.forEach(f => {
        f.el.classList.remove('pulse');
        f.el.classList.add(f === winner ? 'winner' : 'loser');
      });
    }

    function makeDot(x, y, idx) {
      const el = document.createElement('div');
      el.className = 'dot';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.borderColor = palette[idx % palette.length];
      touchpad.appendChild(el);
      return el;
    }

    touchpad.addEventListener('touchstart', e => {
      e.preventDefault();
      if (decided) return;
      hint.style.display = 'none';
      for (const t of e.changedTouches) {
        const el = makeDot(t.clientX, t.clientY, order);
        fingers.set(t.identifier, { el, order: order++ });
      }
      schedulePick();
    }, { passive: false });

    touchpad.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const f = fingers.get(t.identifier);
        if (f) { f.el.style.left = t.clientX + 'px'; f.el.style.top = t.clientY + 'px'; }
      }
    }, { passive: false });

    function onTouchEnd(e) {
      for (const t of e.changedTouches) {
        const f = fingers.get(t.identifier);
        if (f) { f.el.remove(); fingers.delete(t.identifier); }
      }
      if (fingers.size === 0) resetFinger();
      else if (!decided) schedulePick();
    }
    touchpad.addEventListener('touchend', onTouchEnd);
    touchpad.addEventListener('touchcancel', onTouchEnd);
  </script>
  <script>
    if (window.navigator.standalone) {
      document.addEventListener('click', function (e) {
        var a = e.target.closest('a');
        if (a && a.host === location.host && !a.target) { e.preventDefault(); location.href = a.href; }
      });
    }
  </script>
</body>
</html>
