<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nizza</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nizza">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="theme-color" content="#11131a">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #111; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column; gap: 14px; justify-content: center; text-align: center; }
    h1 { font-weight: 600; margin: 0 0 10px; }
    a.tile { display: block; text-decoration: none; color: #111; border: 1px solid #ccc; border-radius: 14px; padding: 22px; font-size: 1.3rem; font-weight: 600; }
    a.tile:active { background: #f2f2f2; }
    .emoji { font-size: 1.6rem; margin-right: 8px; }
    .muted { color: #999; font-size: 0.85rem; margin-top: 18px; }
    #resetAura { margin-top: 10px; align-self: center; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 8px 16px; color: #999; font: inherit; cursor: pointer; }
    #resetAura:active { background: #f2f2f2; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Nizza</h1>
    <a class="tile" href="/aura/"><span class="emoji">✨</span>Aura</a>
    <a class="tile" href="/chooser/"><span class="emoji">🎡</span>Chooser</a>
    <a class="tile" href="/hater/"><span class="emoji">🔥</span>Hater</a>
    <button id="resetAura">↺ Reset Aura</button>
    <p class="muted">Tipp: Teilen → „Zum Home-Bildschirm" für die App.</p>
  </div>
  <script>
    document.getElementById('resetAura').onclick = async function () {
      if (!confirm('Aura zurücksetzen? Alle Helden auf 67, alle Quests wieder offen.')) return;
      const b = document.getElementById('resetAura');
      b.disabled = true; b.textContent = 'Reset…';
      try { await fetch('/api/reset', { method: 'POST' }); b.textContent = 'Erledigt ✓'; }
      catch (e) { b.textContent = '⚠️ Fehler'; }
      setTimeout(function () { b.disabled = false; b.textContent = '↺ Reset Aura'; }, 1500);
    };

    if (window.navigator.standalone) {
      document.addEventListener('click', function (e) {
        var a = e.target.closest('a');
        if (a && a.host === location.host && !a.target) { e.preventDefault(); location.href = a.href; }
      });
    }
  </script>
</body>
</html>
