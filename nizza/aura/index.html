<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nizza">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="theme-color" content="#11131a">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #111; }
    .apphome { position: fixed; top: 12px; left: 12px; z-index: 50; text-decoration: none; font-size: 1.3rem; line-height: 1; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 6px 12px; color: #111; }
    .container { max-width: 560px; margin: 0 auto; padding: 60px 14px 40px; }
    .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
    .tab { font: inherit; padding: 8px 20px; border: 1px solid #ccc; border-radius: 999px; background: #fff; cursor: pointer; }
    .tab.active { background: #111; color: #fff; border-color: #111; }
    .hidden { display: none; }

    /* heroes */
    .hero { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border: 1px solid #eee; border-radius: 14px; padding: 12px; margin: 8px 0; }
    .face { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; flex: none; background: #f3f3f3; }
    .aura { font-size: 1.8rem; font-weight: 700; min-width: 52px; text-align: center; }
    .aura.neg { color: #c00; }
    .crown { font-size: 0.7rem; background: #f4c220; color: #111; border-radius: 6px; padding: 2px 6px; font-weight: 700; white-space: nowrap; }
    .spacer { flex: 1; }
    .boost { font-size: 0.72rem; color: #0a8a00; border: 1px solid #0a8a00; border-radius: 6px; padding: 2px 5px; }
    .play, .rmvid { text-decoration: none; font-size: 1rem; color: #111; border: 1px solid #ccc; border-radius: 8px; padding: 6px 9px; background: #fff; cursor: pointer; }
    .amt { width: 56px; font: inherit; padding: 8px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
    .hero button.step { font-size: 1.25rem; width: 44px; height: 44px; border: 1px solid #ccc; border-radius: 10px; background: #fff; cursor: pointer; }
    .hero button.step:active { background: #f2f2f2; }
    .vidbtn { font-size: 1rem; border: 1px solid #ccc; border-radius: 8px; padding: 6px 9px; background: #fff; cursor: pointer; }

    /* quests */
    .box { border: 1px solid #eee; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .box .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    select, .ti, .qa { font: inherit; padding: 9px 10px; border: 1px solid #ccc; border-radius: 8px; }
    .ti { flex: 1; min-width: 140px; }
    .qa { width: 80px; text-align: center; }
    button.primary { background: #111; color: #fff; border: 1px solid #111; border-radius: 8px; padding: 9px 16px; font: inherit; cursor: pointer; }
    button { cursor: pointer; }
    h3 { font-size: 0.95rem; color: #555; margin: 18px 0 6px; }
    .quest { display: flex; align-items: center; gap: 8px; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin: 6px 0; }
    .quest .qinfo { flex: 1; }
    .quest .qinfo b { display: block; }
    .quest .qamt { font-size: 0.85rem; color: #777; }
    .quest .done { background: #111; color: #fff; border: 1px solid #111; border-radius: 8px; padding: 8px 12px; font: inherit; }
    .quest .qdel { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 8px 10px; color: #999; }

    /* picker overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .sheet { background: #fff; width: 100%; max-width: 560px; border-radius: 16px 16px 0 0; padding: 18px; }
    .sheet h2 { font-size: 1.1rem; margin: 0 0 10px; }
    .pick { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #eee; border-radius: 10px; margin: 6px 0; cursor: pointer; }
    .pick img { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; }
    .pick input { width: 20px; height: 20px; }
    .sheet .actions { display: flex; gap: 8px; margin-top: 14px; }
    .sheet .actions button { flex: 1; padding: 12px; border-radius: 10px; font: inherit; }
  </style>
</head>
<body>
  <a href="/" class="apphome">←</a>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="heroes">Helden</button>
      <button class="tab" data-tab="quests">Quests</button>
    </div>
    <div id="heroesView"></div>
    <div id="questsView" class="hidden">
      <div class="box">
        <div class="row">
          <select id="qcat">
            <option value="giga">Giga Quest</option>
            <option value="main">Main Quest</option>
            <option value="side" selected>Sidequest</option>
            <option value="battlepass">Battle Pass</option>
          </select>
          <input class="ti" id="qtitle" placeholder="Quest-Name">
          <input class="qa" id="qamount" type="number" value="50">
          <span id="qunit">Aura</span>
          <button class="primary" id="qcreate">Erstellen</button>
        </div>
      </div>
      <div id="questList"></div>
    </div>
  </div>

  <!-- hero picker -->
  <div id="picker" class="overlay hidden">
    <div class="sheet">
      <h2 id="pickerTitle">Wer kriegt die Aura?</h2>
      <div id="pickerHeroes"></div>
      <div class="actions">
        <button id="pickerCancel">Abbrechen</button>
        <button id="pickerOk" class="primary">Bestätigen</button>
      </div>
    </div>
  </div>

  <script>
    const HEROES = [
      { name: 'Batman', file: 'batman' },
      { name: 'Hulk', file: 'hulk' },
      { name: 'Ironman', file: 'ironman' },
      { name: 'Rocket Racoon', file: 'racoon' }
    ];
    const START = 67;
    const CAT = { giga: 'Giga Quests', main: 'Main Quests', side: 'Sidequests', battlepass: 'Battle Pass' };
    const CAT_ORDER = ['giga', 'main', 'side', 'battlepass'];
    const state = {};   // name -> { value, has_video, bonus_pct }
    const cards = {};
    let quests = [];

    // ---------- tabs ----------
    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
      document.getElementById('heroesView').classList.toggle('hidden', t.dataset.tab !== 'heroes');
      document.getElementById('questsView').classList.toggle('hidden', t.dataset.tab !== 'quests');
    });

    // ---------- heroes ----------
    const heroesView = document.getElementById('heroesView');
    for (const h of HEROES) {
      const el = document.createElement('div');
      el.className = 'hero';
      el.innerHTML =
        `<img class="face" src="/heroes/${h.file}.png" alt="${h.name}">` +
        `<div class="aura">…</div>` +
        `<span class="crown hidden">👑 Aura Farmer</span>` +
        `<div class="spacer"></div>` +
        `<span class="boost hidden"></span>` +
        `<a class="play hidden" target="_blank" rel="noopener">▶</a>` +
        `<button class="rmvid hidden" title="Video entfernen">✕</button>` +
        `<input class="amt" type="number" inputmode="numeric" value="10">` +
        `<button class="step minus">−</button>` +
        `<button class="step plus">+</button>` +
        `<button class="vidbtn">🎬</button>` +
        `<input class="vidfile" type="file" accept="video/*" hidden>`;
      heroesView.appendChild(el);
      cards[h.name] = el;

      const amt = () => { const v = Math.trunc(Number(el.querySelector('.amt').value)); return Number.isFinite(v) && v !== 0 ? v : 10; };
      el.querySelector('.minus').onclick = () => change(h.name, -Math.abs(amt()));
      el.querySelector('.plus').onclick = () => change(h.name, Math.abs(amt()));
      el.querySelector('.vidbtn').onclick = () => el.querySelector('.vidfile').click();
      el.querySelector('.vidfile').onchange = (e) => { const f = e.target.files[0]; e.target.value = ''; if (f) uploadVideo(h.name, f, el.querySelector('.vidbtn')); };
      el.querySelector('.rmvid').onclick = () => removeVideo(h.name);
    }

    async function change(name, delta) {
      const cur = state[name] || { value: START };
      render({ [name]: { ...cur, value: cur.value + delta } });
      const res = await fetch('/api/aura', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name, delta }) });
      applyAura((await res.json()).aura);
    }

    function applyAura(rows) {
      if (!rows) return;
      const map = {};
      for (const r of rows) map[r.name] = { value: r.value, has_video: r.has_video, bonus_pct: r.bonus_pct };
      render(map);
    }

    function render(map) {
      for (const h of HEROES) {
        if (!map[h.name]) continue;
        state[h.name] = { ...state[h.name], ...map[h.name] };
        const s = state[h.name];
        const card = cards[h.name];
        const auraEl = card.querySelector('.aura');
        auraEl.textContent = s.value;
        auraEl.classList.toggle('neg', s.value < 0);
        const pct = (s.has_video ? 10 : 0) + (s.bonus_pct || 0);
        const boost = card.querySelector('.boost');
        boost.classList.toggle('hidden', pct <= 0);
        boost.textContent = '+' + pct + '%';
        const play = card.querySelector('.play');
        play.classList.toggle('hidden', !s.has_video);
        if (s.has_video) play.href = '/api/video/get?name=' + encodeURIComponent(h.name);
        card.querySelector('.rmvid').classList.toggle('hidden', !s.has_video);
      }
      // order + Aura Farmer crown (only for a clear, unique leader)
      const sorted = [...HEROES].map(h => h.name).sort((a, b) => (state[b]?.value ?? START) - (state[a]?.value ?? START));
      sorted.forEach((name, i) => cards[name].style.order = i);
      const leader = sorted[0], second = sorted[1];
      const clear = leader && (state[leader]?.value ?? START) > (state[second]?.value ?? START);
      for (const h of HEROES) cards[h.name].querySelector('.crown').classList.toggle('hidden', !(clear && h.name === leader));
    }

    // ---------- video ----------
    const CHUNK = 20 * 1024 * 1024;
    async function putPart(c, n, chunk) {
      for (let attempt = 0; attempt < 4; attempt++) {
        try {
          const res = await fetch(`/api/video/part?key=${encodeURIComponent(c.key)}&uploadId=${encodeURIComponent(c.uploadId)}&partNumber=${n}`, { method: 'PUT', body: chunk });
          if (!res.ok) throw new Error('status ' + res.status);
          const j = await res.json();
          if (!j.etag) throw new Error('no etag');
          return j.etag;
        } catch (e) {
          if (attempt === 3) throw e;
          await new Promise(r => setTimeout(r, 1200 * (attempt + 1)));
        }
      }
    }
    async function uploadVideo(name, file, btn) {
      const label = btn.textContent;
      try {
        const c = await (await fetch('/api/video/create', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name, contentType: file.type }) })).json();
        if (c.error) { btn.textContent = '⚠️'; return; }
        const parts = [];
        let pos = 0, n = 1;
        while (pos < file.size) {
          const chunk = file.slice(pos, pos + CHUNK);
          parts.push({ partNumber: n, etag: await putPart(c, n, chunk) });
          pos += CHUNK; n++;
          btn.textContent = Math.min(99, Math.round(pos / file.size * 100)) + '%';
        }
        await fetch('/api/video/complete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name, key: c.key, uploadId: c.uploadId, parts }) });
        btn.textContent = label;
        poll();
      } catch (e) { btn.textContent = '⚠️'; }
    }
    async function removeVideo(name) {
      if (!confirm('Video von ' + name + ' entfernen?')) return;
      await fetch('/api/video/delete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name }) });
      poll();
    }

    // ---------- quests ----------
    const qcat = document.getElementById('qcat');
    const qunit = document.getElementById('qunit');
    qcat.onchange = () => { qunit.textContent = qcat.value === 'battlepass' ? '% Boost' : 'Aura'; };

    document.getElementById('qcreate').onclick = async () => {
      const category = qcat.value;
      const title = document.getElementById('qtitle').value.trim();
      const amount = Math.trunc(Number(document.getElementById('qamount').value));
      if (!title || !(amount > 0)) { alert('Name und Betrag (> 0) angeben.'); return; }
      const res = await fetch('/api/quests', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ category, title, amount }) });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      document.getElementById('qtitle').value = '';
      quests = data.quests; renderQuests();
    };

    async function loadQuests() {
      try { quests = (await (await fetch('/api/quests')).json()).quests || []; renderQuests(); } catch {}
    }

    function questAmtText(q) { return q.category === 'battlepass' ? `+${q.amount}% Boost` : `+${q.amount} Aura`; }

    function renderQuests() {
      const list = document.getElementById('questList');
      list.innerHTML = '';
      for (const cat of CAT_ORDER) {
        const items = quests.filter(q => q.category === cat);
        if (!items.length) continue;
        const h = document.createElement('h3'); h.textContent = CAT[cat]; list.appendChild(h);
        for (const q of items) {
          const el = document.createElement('div');
          el.className = 'quest';
          el.innerHTML =
            `<div class="qinfo"><b>${esc(q.title)}</b><span class="qamt">${questAmtText(q)}</span></div>` +
            `<button class="done" data-done="${q.id}">Erledigt</button>` +
            `<button class="qdel" data-del="${q.id}">✕</button>`;
          list.appendChild(el);
        }
      }
      list.querySelectorAll('[data-done]').forEach(b => b.onclick = () => openPicker(parseInt(b.dataset.done, 10)));
      list.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
        if (!confirm('Quest löschen?')) return;
        quests = (await (await fetch('/api/quests?id=' + b.dataset.del, { method: 'DELETE' })).json()).quests || [];
        renderQuests();
      });
    }

    // ---------- picker ----------
    const picker = document.getElementById('picker');
    let pickQuestId = null;
    function openPicker(id) {
      pickQuestId = id;
      const q = quests.find(x => x.id === id);
      document.getElementById('pickerTitle').textContent = q ? (q.title + ' — ' + questAmtText(q)) : 'Wer?';
      const box = document.getElementById('pickerHeroes');
      box.innerHTML = '';
      for (const h of HEROES) {
        const row = document.createElement('label');
        row.className = 'pick';
        row.innerHTML = `<img src="/heroes/${h.file}.png"><span style="flex:1">${h.name}</span><input type="checkbox" value="${h.name}">`;
        box.appendChild(row);
      }
      picker.classList.remove('hidden');
    }
    document.getElementById('pickerCancel').onclick = () => picker.classList.add('hidden');
    document.getElementById('pickerOk').onclick = async () => {
      const heroes = [...picker.querySelectorAll('input:checked')].map(i => i.value);
      if (!heroes.length) { picker.classList.add('hidden'); return; }
      const res = await fetch('/api/quest-complete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id: pickQuestId, heroes }) });
      applyAura((await res.json()).aura);
      picker.classList.add('hidden');
      document.querySelector('.tab[data-tab="heroes"]').click();   // jump to board to see the gains
    };

    // ---------- sync ----------
    async function poll() {
      try { applyAura((await (await fetch('/api/aura')).json()).aura); } catch {}
    }
    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    poll(); loadQuests();
    setInterval(() => { poll(); loadQuests(); }, 2000);

    if (window.navigator.standalone) {
      document.addEventListener('click', function (e) {
        var a = e.target.closest('a');
        if (a && a.host === location.host && !a.target) { e.preventDefault(); location.href = a.href; }
      });
    }
  </script>
</body>
</html>
